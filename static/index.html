<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeopardy!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANDING SCREEN -->
  <div id="screen-landing" class="screen">
    <div class="center-content">
      <h1 class="title">Jeopardy!</h1>
      <div class="landing-buttons">
        <button class="btn btn-primary" id="btn-new-game">New Game</button>
        <button class="btn btn-secondary" id="btn-load-game">Load Game</button>
      </div>
    </div>
  </div>

  <!-- CONFIG SCREEN -->
  <div id="screen-config" class="screen hidden">
    <div class="screen-header">
      <button class="btn btn-back" id="btn-config-back">← Back</button>
      <h2>Game Setup</h2>
    </div>
    <div class="form-container">
      <div class="form-group">
        <label for="game-name">Game Name (optional)</label>
        <input type="text" id="game-name" placeholder="e.g. Game Night 2026" />
      </div>
      <div class="form-group">
        <label for="num-categories">Number of Categories</label>
        <input type="number" id="num-categories" value="6" min="1" max="10" />
      </div>
      <div class="form-group">
        <label for="num-questions">Questions per Category</label>
        <input type="number" id="num-questions" value="5" min="1" max="10" />
      </div>
      <div class="form-group">
        <label for="point-values">Point Values (comma-separated)</label>
        <input type="text" id="point-values" value="200,400,600,800,1000" />
      </div>
      <div class="form-group">
        <label for="num-players">Number of Players</label>
        <input type="number" id="num-players" value="2" min="2" max="8" />
      </div>
      <div id="player-names-container"></div>
      <div id="config-error" class="error-msg hidden"></div>
      <button class="btn btn-primary" id="btn-config-next">Next →</button>
    </div>
  </div>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen hidden">
    <div class="screen-header">
      <button class="btn btn-back" id="btn-setup-back">← Back</button>
      <h2>Enter Questions &amp; Answers</h2>
    </div>
    <div id="categories-container"></div>
    <div class="setup-actions">
      <div id="setup-error" class="error-msg hidden"></div>
      <div class="setup-buttons">
        <button class="btn btn-primary" id="btn-save-and-start">Save &amp; Start Game</button>
      </div>
    </div>
  </div>

  <!-- BOARD SCREEN -->
  <div id="screen-board" class="screen hidden">
    <div class="screen-header board-header">
      <button class="btn btn-back" id="btn-board-back">← Home</button>
      <h2 id="board-title">Jeopardy!</h2>
    </div>
    <div class="board-layout">
      <div id="game-board"></div>
      <div id="scoreboard">
        <h3 class="scoreboard-title">Scores</h3>
        <div id="scoreboard-players"></div>
      </div>
    </div>
  </div>

  <!-- LOAD SCREEN -->
  <div id="screen-load" class="screen hidden">
    <div class="screen-header">
      <button class="btn btn-back" id="btn-load-back">← Back</button>
      <h2>Load a Game</h2>
    </div>
    <div id="load-game-list" class="load-list"></div>
  </div>

  <!-- PLAYERS SCREEN (used when loading a saved game) -->
  <div id="screen-players" class="screen hidden">
    <div class="screen-header">
      <button class="btn btn-back" id="btn-players-back">← Back</button>
      <h2>Who's Playing?</h2>
    </div>
    <div id="resume-banner" class="resume-banner hidden">
      <p>Saved progress found. Player names restored from your last session.</p>
      <p class="resume-hint">Change the player count or names to start fresh instead.</p>
    </div>
    <div class="form-container">
      <div class="form-group">
        <label for="num-players-load">Number of Players</label>
        <input type="number" id="num-players-load" value="2" min="2" max="8" />
      </div>
      <div id="player-names-container-load"></div>
      <button class="btn btn-primary" id="btn-players-start">Start Game →</button>
    </div>
  </div>

  <!-- FINAL SCORES SCREEN -->
  <div id="screen-final" class="screen hidden">
    <div class="center-content">
      <div id="final-winner-area"></div>
      <div id="final-scores-list"></div>
      <button class="btn btn-primary" id="btn-final-home">Back to Home</button>
    </div>
  </div>

  <!-- QUESTION MODAL -->
  <div id="question-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-meta">
        <span id="modal-category" class="modal-category-label"></span>
        <span id="modal-value" class="modal-value-label"></span>
      </div>

      <!-- DD Step 1: Who is wagering? -->
      <div id="modal-dd-player-step" class="modal-dd-step hidden">
        <p class="dd-step-prompt">Who is wagering?</p>
        <div id="dd-player-buttons"></div>
      </div>

      <!-- DD Step 2: Wager input -->
      <div id="modal-dd-wager-step" class="modal-dd-step hidden">
        <p class="dd-step-prompt">Enter your wager</p>
        <p id="dd-wager-hint" class="dd-wager-hint"></p>
        <div class="dd-wager-row">
          <span class="dd-dollar">$</span>
          <input type="number" id="dd-wager-input" min="1" placeholder="0" />
        </div>
        <div id="dd-wager-error" class="error-msg hidden"></div>
        <button class="btn btn-primary" id="btn-dd-reveal">Reveal Question →</button>
      </div>

      <div id="modal-question-area" class="modal-question-area">
        <p id="modal-question" class="modal-question-text"></p>
      </div>
      <div id="modal-answer-area" class="modal-answer-area hidden">
        <img id="modal-answer-img" class="modal-answer-img hidden" alt="answer image" />
        <p id="modal-answer" class="modal-answer-text"></p>
      </div>
      <div id="modal-attribution" class="modal-attribution hidden">
        <p class="attribution-prompt">Who got it right?</p>
        <div id="attribution-buttons"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-show-answer">Show Answer</button>
        <button class="btn btn-secondary" id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  <div id="img-lightbox" class="img-lightbox hidden">
    <img id="img-lightbox-img" alt="enlarged answer image" />
  </div>

  <script src="app.js"></script>
</body>
</html>
